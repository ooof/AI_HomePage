<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI HomePage 项目页</title>
  <style>
    :root {
      --ink: #23201a;
      --muted: #7a7264;
      --paper: #faf6ee;
      --paper-2: #f3ece0;
      --surface: rgba(255, 253, 248, 0.72);
      --line: #e2d7c5;
      --hair: #cbbda3;
      --gold: #9a7b3f;
      --gold-soft: rgba(154, 123, 63, 0.5);
      --jade: #386b5f;
      --shadow: rgba(58, 46, 28, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
      background:
        radial-gradient(1200px 600px at 12% -8%, rgba(154, 123, 63, 0.10), transparent 55%),
        radial-gradient(1000px 620px at 108% 6%, rgba(56, 107, 95, 0.09), transparent 55%),
        linear-gradient(180deg, var(--paper), var(--paper-2));
      background-attachment: fixed;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(880px, calc(100% - 48px));
      margin: 0 auto;
      padding: 96px 0 64px;
    }

    /* Hero */
    .hero {
      padding-bottom: 44px;
      position: relative;
    }

    .hero::after {
      content: "";
      display: block;
      margin-top: 40px;
      height: 1px;
      background: linear-gradient(90deg, var(--hair), transparent 72%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 22px;
      color: var(--gold);
      font-family: "Optima", "Baskerville", Georgia, serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 1px;
      background: var(--gold-soft);
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 68px);
      font-weight: 500;
      line-height: 1.18;
      letter-spacing: 0.01em;
    }

    .intro {
      max-width: 620px;
      margin: 26px 0 0;
      color: var(--muted);
      font-size: 17px;
      font-weight: 300;
      line-height: 2.0;
      letter-spacing: 0.02em;
    }

    /* Project list */
    .project-list {
      display: grid;
      gap: 4px;
      margin-top: 12px;
    }

    .project-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 28px;
      align-items: center;
      padding: 30px 8px;
      border-bottom: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
      position: relative;
      transition: padding-left 320ms cubic-bezier(0.22, 1, 0.36, 1),
                  background 320ms ease;
    }

    .project-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 1px;
      background: var(--gold);
      transform: translateY(-50%);
      transition: width 320ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .project-card:hover {
      padding-left: 40px;
    }

    .project-card:hover::before {
      width: 22px;
    }

    .index {
      font-family: "Optima", "Baskerville", Georgia, serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--gold);
      padding-top: 4px;
      align-self: start;
    }

    .project-card h2 {
      margin: 0;
      font-size: 23px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: 0.01em;
      transition: color 220ms ease;
    }

    .project-card:hover h2 {
      color: var(--gold);
    }

    .project-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.02em;
    }

    .arrow {
      color: var(--hair);
      font-family: Georgia, serif;
      font-size: 22px;
      transition: color 220ms ease, transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .project-card:hover .arrow {
      color: var(--jade);
      transform: translateX(6px);
    }

    /* Footer */
    footer {
      margin-top: 60px;
      padding-top: 26px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-align: center;
    }

    footer .seal {
      color: var(--gold);
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 32px, 880px);
        padding: 60px 0 48px;
      }

      .project-card {
        grid-template-columns: auto 1fr;
        gap: 18px;
        padding: 26px 4px;
      }

      .project-card:hover {
        padding-left: 4px;
      }

      .arrow {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <p class="eyebrow">AI HomePage Collection</p>
      <h1>AI HomePage 项目页</h1>
      <p class="intro">一个整理中的作品入口，收纳研究、业务展示与 AI 网页实验。每一件作品皆以独立页面呈现，宜于静观细览，亦便于对外分享。</p>
    </header>

    <section class="project-list" aria-label="项目列表">
      <a class="project-card" href="https://ooof.github.io/AI_HomePage/ningxia-carpet-research/ningxia-role.html">
        <span class="index">Ⅰ</span>
        <span>
          <h2>宁夏地毯的历史作用、价值评估与产业启示</h2>
          <p>历史脉络、文化价值与产业观察的专题整理。</p>
        </span>
        <span class="arrow">→</span>
      </a>

      <a class="project-card" href="https://ooof.github.io/AI_HomePage/slj-portal/index.html">
        <span class="index">Ⅱ</span>
        <span>
          <h2>水利局业务进展概览</h2>
          <p>面向业务进度与工作概览的信息展示页。</p>
        </span>
        <span class="arrow">→</span>
      </a>

      <a class="project-card" href="https://ooof.github.io/AI_HomePage/ai-3-html/index.html">
        <span class="index">Ⅲ</span>
        <span>
          <h2>三个 AI Agent 制作网页效果比较</h2>
          <p>以相同提示词对比不同 AI Agent 的网页生成结果。</p>
        </span>
        <span class="arrow">→</span>
      </a>
    </section>

    <footer><span class="seal">◈</span>&nbsp;&nbsp;ooof 开放实验室 · 2026-07-24</footer>
  </main>
</body>
</html>

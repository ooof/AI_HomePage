<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>网页 A</title>


<style>

body{

    font-family:"Microsoft YaHei",Arial;

    text-align:center;

    background:#f5f5f5;

}



.circle{

    width:220px;

    height:220px;

    border-radius:50%;

    margin:40px auto;

    position:relative;

}



.circle:after{

    content:"";

    position:absolute;

    width:120px;

    height:120px;

    background:white;

    border-radius:50%;

    left:50px;

    top:50px;

}



h1{

    color:#ff5252;

}


button,a{

    font-size:18px;

    margin:10px;

}



</style>


</head>



<body>


<h1>网页 A</h1>



<div id="circle" class="circle"></div>



<h2>
当前页面：A
</h2>



<p id="info"></p>



<hr>


<h3>跳转到：</h3>


<a href="b.html" onclick="go('B')">
进入 B 页面
</a>


<br><br>


<a href="c.html" onclick="go('C')">
进入 C 页面
</a>


<br><br>


<a href="index.html">
查看关系网络
</a>



<script src="app.js"></script>



<script>


// 当前页面

const currentPage="A";



// 点击跳转记录

function go(target){

    visitPage(
        currentPage,
        target
    );

}



// 绘制圆环

function drawCircle(){


    let data=getNetworkData();



    let total=

        data.views.A+

        data.views.B+

        data.views.C;



    if(total===0){

        total=1;

    }



    let a=

        data.views.A/total*360;



    let b=

        data.views.B/total*360;



    document
    .getElementById("circle")
    .style.background=

`
conic-gradient(

#ff5252 0deg ${a}deg,

rgba(76,175,80,0.35)
${a}deg ${a+b}deg,

rgba(66,133,244,0.35)
${a+b}deg 360deg

)

`;



    document
    .getElementById("info")
    .innerHTML=

`

访问次数：

A：${data.views.A}

&nbsp;&nbsp;

B：${data.views.B}

&nbsp;&nbsp;

C：${data.views.C}

`;

}


drawCircle();


</script>



</body>

</html>

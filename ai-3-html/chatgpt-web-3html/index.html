<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
网页关系网络分析
</title>


<script src="https://d3js.org/d3.v7.min.js"></script>


<style>


body{

    font-family:"Microsoft YaHei",Arial;

    text-align:center;

    background:#f5f5f5;

}



svg{

    background:white;

    border:1px solid #ccc;

    margin-top:20px;

}



.info{

    font-size:18px;

}



.node text{

    fill:white;

    font-size:20px;

    font-weight:bold;

    text-anchor:middle;

    dominant-baseline:middle;

}



.link{

    stroke:#888;

}



</style>


</head>



<body>


<h1>
网页关系网络
</h1>



<div class="info">


<p id="views"></p>


<p id="rank"></p>


</div>



<button onclick="draw()">

刷新网络

</button>

<br><br>

<a href="a.html">进入 A 页面</a>

&nbsp;&nbsp;

<a href="b.html">进入 B 页面</a>

&nbsp;&nbsp;

<a href="c.html">进入 C 页面</a>

<br>


<svg width="800" height="600"></svg>



<script src="app.js"></script>



<script>


const svg=d3.select("svg");



function draw(){


svg.selectAll("*").remove();



let graph=getGraph();


let rank=getPageRank();




// 显示数据


document
.getElementById("views")
.innerHTML=

`
访问次数：

A:${graph.nodes[0].value}

&nbsp;

B:${graph.nodes[1].value}

&nbsp;

C:${graph.nodes[2].value}

`;



document
.getElementById("rank")
.innerHTML=

`

PageRank：

A:${rank.A.toFixed(3)}

&nbsp;

B:${rank.B.toFixed(3)}

&nbsp;

C:${rank.C.toFixed(3)}

`;





// 力导向图


let simulation=d3.forceSimulation(graph.nodes)


.force(

"link",

d3.forceLink(graph.links)

.id(d=>d.id)

.distance(180)

)



.force(

"charge",

d3.forceManyBody()

.strength(-400)

)



.force(

"center",

d3.forceCenter(400,300)

);






// 绘制连线


let links=svg

.selectAll(".link")

.data(graph.links)

.enter()

.append("line")

.attr("class","link")

.attr(

"stroke-width",

d=>Math.max(

2,

d.value*4

)

);







// 绘制节点


let nodes=

svg.selectAll(".node")

.data(graph.nodes)

.enter()

.append("g")

.attr("class","node")

.call(

d3.drag()

.on("start",dragStart)

.on("drag",dragging)

.on("end",dragEnd)

);






nodes.append("circle")

.attr(

"r",

d=>30+d.value*3

)


.attr(

"fill",

d=>{


let colors={

A:"#ff5252",

B:"#4caf50",

C:"#4285f4"

};


return colors[d.id];


}

);






nodes.append("text")

.text(d=>d.id);







simulation.on(

"tick",

()=>{


links

.attr(

"x1",

d=>d.source.x

)

.attr(

"y1",

d=>d.source.y

)

.attr(

"x2",

d=>d.target.x

)

.attr(

"y2",

d=>d.target.y

);





nodes.attr(

"transform",

d=>

`translate(${d.x},${d.y})`

);



}


);



}




// 拖动功能


function dragStart(event,d){


if(!event.active)

event.subject.fx=d.x;


if(!event.active)

event.subject.fy=d.y;


}



function dragging(event,d){


d.fx=event.x;

d.fy=event.y;


}



function dragEnd(event,d){


d.fx=null;

d.fy=null;


}




draw();



</script>



</body>

</html>

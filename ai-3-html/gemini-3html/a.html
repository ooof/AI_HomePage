<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面 A</title>
  <style>
    :root {
      --color-a: #FF5252;
      --color-b: #4CAF50;
      --color-c: #2196F3;
      --inactive: #334155;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: #1e293b;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    h1 { margin: 0; color: var(--color-a); }
    
    .ring-nav {
      position: relative;
      width: 220px;
      height: 220px;
    }
    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .segment {
      fill: none;
      stroke-width: 20;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .segment:hover {
      stroke-width: 26;
      filter: brightness(1.2);
    }
    
    .seg-a { stroke: var(--color-a); filter: drop-shadow(0 0 8px var(--color-a)); }
    .seg-b { stroke: var(--inactive); opacity: 0.4; }
    .seg-c { stroke: var(--inactive); opacity: 0.4; }

    .center-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--color-a);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>欢迎来到 页面 A</h1>
    <p>点击下方环形图中对应的区域可跳转至其他页面：</p>

    <div class="ring-nav">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <a href="a.html">
          <circle class="segment seg-a" cx="50" cy="50" r="35" 
                  stroke-dasharray="70 150" stroke-dashoffset="0" />
        </a>
        <a href="b.html">
          <circle class="segment seg-b" cx="50" cy="50" r="35" 
                  stroke-dasharray="70 150" stroke-dashoffset="-73.3" />
        </a>
        <a href="c.html">
          <circle class="segment seg-c" cx="50" cy="50" r="35" 
                  stroke-dasharray="70 150" stroke-dashoffset="-146.6" />
        </a>
      </svg>
      <div class="center-label">页面 A</div>
    </div>
  </div>

</body>
</html>

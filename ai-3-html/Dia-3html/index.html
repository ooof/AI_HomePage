<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面 A</title>
<style>
  :root{
    --accent:#2f7d4f; --accent2:#245f3c;
    --ink:#1a1a1a; --ink-soft:#3a3a3a; --muted:#8a948a;
    --soft:#f3f7f2; --mid:#dcefe2; --line:#e6e1d6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#ededed;padding:0 0 72px;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;color:var(--ink);line-height:1.9;letter-spacing:.02em;}
  .page{max-width:677px;margin:0 auto;background:#fff;min-height:100vh;}

  /* 顶部导航 */
  nav{display:flex;gap:6px;padding:14px 20px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  nav a{flex:1;text-align:center;padding:9px 0;border-radius:8px;text-decoration:none;font-weight:700;font-size:15px;color:var(--ink-soft);border:1px solid var(--line);transition:.15s;}
  nav a:hover{background:var(--soft);}
  nav a.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}

  header{padding:40px 20px 34px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;text-align:center;}
  header .eyebrow{font-size:13px;letter-spacing:.28em;opacity:.82;margin-bottom:12px;}
  header h1{font-size:34px;font-weight:800;line-height:1.2;}
  header p{margin-top:12px;font-size:15px;opacity:.9;}

  .body{padding:30px 20px;}
  .body p{margin:0 0 16px;color:var(--ink-soft);}
  h2{font-size:20px;font-weight:700;border-bottom:2px solid var(--mid);padding-bottom:12px;margin:6px 0 16px;}
  .card{background:var(--soft);border-radius:10px;padding:20px;margin:0 0 18px;}
  .card h3{font-size:16px;color:var(--accent);margin-bottom:8px;}
  .go{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:10px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;border-radius:8px;font-weight:700;font-size:14px;}
  .links{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;}
  .links a{flex:1;min-width:180px;background:var(--mid);border-radius:10px;padding:16px;text-decoration:none;color:#1e5a37;}
  .links a b{display:block;font-size:15px;margin-bottom:4px;}
  .links a span{font-size:13px;color:#4a6a54;}
  footer{text-align:center;padding:24px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);}

  /* 三段环形导航 */
  .ring-wrap{display:flex;justify-content:center;margin:24px 0 0;}
  .ring{width:150px;height:150px;}
  .ring .seg{fill:none;stroke-width:14;transform-origin:center;transition:.2s;cursor:pointer;}
  .ring .segA{stroke:#2f8f4e;}
  .ring .segB{stroke:#3c6df0;}
  .ring .segC{stroke:#e8883a;}
  .ring .dim{opacity:.22;stroke-width:10;}
  .ring .center-label{font-size:22px;font-weight:800;}
  .ring .center-sub{font-size:9px;letter-spacing:.2em;fill:#8a948a;}
</style>
</head>
<body>
<div class="page">
  <nav>
    <a href="index.html" class="active">A · 首页</a>
    <a href="b.html">B · 指南</a>
    <a href="c.html">C · 关于</a>
  </nav>

  <header>
    <div class="eyebrow">PAGE A</div>
    <h1>页面 A · 首页</h1>
    <p>三页互链演示 · 从这里出发</p>
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 120 120">
        <circle class="seg segB dim" cx="60" cy="60" r="54" stroke-dasharray="100 239.3" style="transform:rotate(30deg);transform-origin:center" onclick="location.href='b.html'"></circle>
        <circle class="seg segC dim" cx="60" cy="60" r="54" stroke-dasharray="100 239.3" style="transform:rotate(150deg);transform-origin:center" onclick="location.href='c.html'"></circle>
        <circle class="seg segA" cx="60" cy="60" r="54" stroke-dasharray="100 239.3" style="transform:rotate(270deg);transform-origin:center" onclick="location.href='index.html'"></circle>
        <text class="center-label" x="60" y="60" text-anchor="middle" dominant-baseline="central" fill="#2f8f4e">A</text>
        <text class="center-sub" x="60" y="80" text-anchor="middle" dominant-baseline="central">当前页</text>
      </svg>
    </div>
  </header>

  <div class="body">
    <h2>这是 A 页</h2>
    <p>这是三个互相链接的网页中的第一个。顶部导航栏在每一页都有，可随时跳到 B 或 C。下面也放了通往另外两页的入口卡片。</p>

    <div class="card">
      <h3>页面关系</h3>
      <p style="margin:0;">A → B → C 首尾相连，且每页都能直达其余两页。三个文件放在同一文件夹，用相对路径互链。</p>
    </div>

    <div class="links">
      <a href="b.html"><b>前往 B · 指南 →</b><span>看看第二个页面讲什么</span></a>
      <a href="c.html"><b>前往 C · 关于 →</b><span>直接跳到第三个页面</span></a>
    </div>

    <p style="margin-top:24px;"><a class="go" href="b.html">下一页：B 指南 →</a></p>
  </div>

  <footer>三页互链演示 · A / B / C</footer>
</div>
</body>
</html>

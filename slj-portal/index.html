.timeline-item { position: relative; margin-bottom: 20px; }

  { id: "riverLake", label: "河湖管理" },
  { id: "waterResource", label: "水资源管理" },
  { id: "ruralWater", label: "农村水利" },
  { id: "soilImmigration", label: "水土保持与移民" }
];

let activeTab = "overview";

function renderNav() {
  const nav = document.getElementById("navTabs");
  nav.innerHTML = TABS.map(function(t) {
    return '<button class="nav-item' + (t.id === activeTab ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</button>';
  }).join('');
}

function switchTab(id) {
  activeTab = id;
  renderNav();
  document.getElementById("contentArea").innerHTML = TABLES[id]();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderNav();
document.getElementById("contentArea").innerHTML = TABLES.overview();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>宋大鹏 &mdash; 临汾市水利局</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f5f7; --surface: #fff; --border: #e2e5ea;
  --text: #1a1f2e; --text-secondary: #5e6778; --accent: #1e6f9f;
  --accent-light: #e8f2f8; --green: #1a8754; --green-bg: #e6f4ea;
  --amber: #b76e00; --amber-bg: #fff4e0; --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 0; }
.header-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
.header a { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; }
.header a:hover { color: var(--text); }
.page { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-accent { background: var(--accent-light); color: var(--accent); }
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ""; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 18px; }
.timeline-item:last-child { margin-bottom: 0; }
.timeline-dot { position: absolute; left: -20px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--surface); }
.timeline-dot.green { background: var(--green); }
.timeline-dot.amber { background: var(--amber); }
.timeline-date { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.timeline-title { font-size: 14px; font-weight: 600; margin: 2px 0; }

</style>
</head>
<body>

</div></div>
<div class="page">
  <h1>宋大鹏</h1>
  <p class="subtitle">临汾市水利局局长 · 主持全面工作</p>
  <div class="card">
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.8;">宋大鹏，现任临汾市水利局局长，主持全面工作。负责领导全市水资源管理、水利工程建设、水旱灾害防御及水土保持等核心业务。</p><h3 style="font-size:16px;font-weight:600;margin:24px 0 12px;color:var(--text);">主要活动</h3><p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.8;">2026年4月22日，宋大鹏在霍州市副市长靳阳阳的陪同下，对霍州市的河道堤防建设、防洪能力提升及郭庄泉域保护管理工作进行了实地调研。</p><h3 style="font-size:16px;font-weight:600;margin:24px 0 12px;color:var(--text);">工作指示</h3><div style="font-size:13.5px;color:var(--text-secondary);margin-bottom:8px;padding-left:14px;border-left:2px solid var(--accent);"><strong>防洪安全</strong> &mdash; 坚持人民至上、生命至上，紧盯防洪薄弱环节，完善防洪工程体系</div><div style="font-size:13.5px;color:var(--text-secondary);margin-bottom:8px;padding-left:14px;border-left:2px solid var(--accent);"><strong>泉域保护</strong> &mdash; 强化泉域范围内水资源管控、水污染防治和生态修复</div><div style="font-size:13.5px;color:var(--text-secondary);margin-bottom:8px;padding-left:14px;border-left:2px solid var(--accent);"><strong>长效管理</strong> &mdash; 健全长效保护管理机制，严守生态保护红线</div>
  </div>
</div>
</body>
</html>
